# INFINIA Backend Configuration Example
# Simple key=value format (no external library dependencies)
# Lines starting with # are comments

# Infinia cluster configuration
cluster=my_cluster
tenant=my_tenant
subtenant=default
dataset=benchmark_data

# Infinia async configuration
sthreads=8
num_buffers=512
num_ring_entries=512
coremasks=0-3

# BatchTask configuration (C++20 coroutine-based async)
max_retries=3

